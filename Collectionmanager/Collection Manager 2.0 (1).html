<style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}:root{--cw:430px}html,body{width:100%;height:100%;overflow-x:hidden;background:#e8edf5}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;-webkit-overflow-scrolling:touch}#root{width:100%;min-height:100vh;background:#e8edf5}@media(max-width:767px){:root{--cw:100%}html,body,#root{background:#f0f4ff}}@media(min-width:768px) and (max-width:1199px){:root{--cw:680px}}@media(min-width:1200px){:root{--cw:860px}}input,select,button,textarea{font-family:inherit;-webkit-appearance:none}input[type=number],input[type=password]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}select{-webkit-appearance:none;appearance:none}*{scrollbar-width:none;-ms-overflow-style:none}::-webkit-scrollbar{display:none}button{cursor:pointer;outline:none;border:none}button,div,span{-webkit-user-select:none;user-select:none}input,textarea,label,select{-webkit-user-select:text;user-select:text}*{-webkit-font-smoothing:antialiased}table{border-collapse:collapse}#splash{position:fixed;inset:0;background:linear-gradient(135deg,#1a3a6b,#2563eb);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999}.sico{font-size:64px;margin-bottom:12px}.sttl{font-size:24px;font-weight:900;color:#fff;font-family:Georgia,serif}.sver{font-size:13px;color:rgba(255,255,255,0.55);margin-top:2px;font-weight:700;letter-spacing:1px}.ssub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px}.sdots{display:flex;gap:8px;margin-top:28px}.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);animation:blink 1.2s infinite}.sdot:nth-child(2){animation-delay:.2s}.sdot:nth-child(3){animation-delay:.4s}@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}@media(min-width:768px){*{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent;-ms
